<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KromaIA</title>
</head>

<body>
    <header class="header">
        <h1>KromaIA</h1>
        <p class="subtitle">Bem-vindo à KromaIA! Transforme suas ideias em backgrounds incríveis com o poder da IA.
            Descreva o que você imagina e veja a magia acontecer!</p>
    </header>
    <main class="container">
        <section class="card main-card">
            <h2>Descreva o background que você deseja criar</h2>
            <form class="form-group">
                <textarea id="description"
                    placeholder="Exemplo: Um céu estrelado com uma lua cheia brilhante sobre um campo de flores silvestres"
                    rows="5"></textarea>
                <button id="generate-btn" class="btn-magic">
                    <span id="btn-text">✨</span> Gerar Background Mágico
                </button>
            </form>
        </section>
        <section id="preview-section" class="preview-card"></section>
        <section id="code-output" class="code-grid">
            <div class="card code-card">
                <h3 class="code-title">Código HTML</h3>
                <pre id="html-code" class="code-block"></pre>
            </div>
            <div class="card code-card">
                <h3 class="code-title">Código CSS</h3>
                <pre id="css-code" class="code-block"></pre>
            </div>
        </section>
    </main>
</body>

</html>
